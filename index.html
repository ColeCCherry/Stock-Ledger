<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ledger — Portfolio & Watchlist</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Serif:ital,wght@0,400;0,600;1,400&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap');

:root{
  --bg: #0E1116;
  --bg-panel: #161B22;
  --bg-card: #1B212B;
  --text: #ECEAE2;
  --text-dim: #8B92A0;
  --accent-gold: #D4A24C;
  --gain: #4FA37D;
  --loss: #C1554D;
  --border: #262C36;
}

*{box-sizing:border-box; margin:0; padding:0;}

body{
  background: var(--bg);
  color: var(--text);
  font-family: 'IBM Plex Sans', sans-serif;
  min-height: 100vh;
}

/* ===== Ticker tape ===== */
.tape-wrap{
  overflow: hidden;
  background: var(--bg-panel);
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
  padding: 10px 0;
}
.tape{
  display: inline-block;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 13px;
  letter-spacing: 0.02em;
  animation: scroll-tape 30s linear infinite;
  padding-left: 100%;
}
.tape-wrap:hover .tape{ animation-play-state: paused; }
@keyframes scroll-tape{
  from{ transform: translateX(0); }
  to{ transform: translateX(-100%); }
}
.tape .tick{ margin-right: 40px; }
.tape .up{ color: var(--gain); }
.tape .down{ color: var(--loss); }
.tape .flat{ color: var(--text-dim); }

/* ===== Header ===== */
header{
  max-width: 980px;
  margin: 0 auto;
  padding: 40px 24px 20px;
}
.eyebrow{
  font-family: 'IBM Plex Mono', monospace;
  font-size: 12px;
  color: var(--accent-gold);
  letter-spacing: 0.12em;
  text-transform: uppercase;
}
h1{
  font-family: 'IBM Plex Serif', serif;
  font-weight: 600;
  font-size: 34px;
  margin-top: 6px;
}
.subtitle{
  color: var(--text-dim);
  font-size: 14px;
  margin-top: 6px;
}

/* ===== Toolbar ===== */
.toolbar{
  max-width: 980px;
  margin: 10px auto 0;
  padding: 0 24px;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}
.tabs{
  display: flex;
  gap: 4px;
  background: var(--bg-panel);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 4px;
}
.tab-btn{
  font-family: 'IBM Plex Sans', sans-serif;
  font-size: 13px;
  font-weight: 500;
  color: var(--text-dim);
  background: transparent;
  border: none;
  padding: 8px 16px;
  border-radius: 6px;
  cursor: pointer;
  transition: background 0.15s, color 0.15s;
}
.tab-btn.active{
  background: var(--bg-card);
  color: var(--text);
}
.spacer{ flex: 1; }
.btn{
  font-family: 'IBM Plex Sans', sans-serif;
  font-size: 13px;
  font-weight: 500;
  padding: 9px 16px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--bg-panel);
  color: var(--text);
  cursor: pointer;
  transition: border-color 0.15s;
}
.btn:hover{ border-color: var(--accent-gold); }
.btn.primary{
  background: var(--accent-gold);
  color: #191510;
  border-color: var(--accent-gold);
  font-weight: 600;
}
.btn.primary:hover{ filter: brightness(1.08); }
.btn:disabled{ opacity: 0.5; cursor: default; }

/* ===== Main ===== */
main{
  max-width: 980px;
  margin: 0 auto;
  padding: 24px 24px 80px;
}

.summary-row{
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  margin-bottom: 24px;
}
.summary-card{
  background: var(--bg-panel);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px 18px;
}
.summary-label{
  font-size: 11px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  font-family: 'IBM Plex Mono', monospace;
}
.summary-value{
  font-family: 'IBM Plex Mono', monospace;
  font-size: 22px;
  margin-top: 6px;
  font-weight: 500;
}

.grid{
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 14px;
}

.card{
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 18px;
  position: relative;
  border-left: 3px solid var(--border);
}
.card.gain-border{ border-left-color: var(--gain); }
.card.loss-border{ border-left-color: var(--loss); }

.card-top{
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
}
.ticker{
  font-family: 'IBM Plex Mono', monospace;
  font-size: 17px;
  font-weight: 600;
  letter-spacing: 0.02em;
}
.company-name{
  font-size: 12px;
  color: var(--text-dim);
  margin-top: 2px;
}
.remove-btn{
  background: none;
  border: none;
  color: var(--text-dim);
  cursor: pointer;
  font-size: 16px;
  line-height: 1;
  padding: 2px 4px;
}
.remove-btn:hover{ color: var(--loss); }

.price-row{
  margin-top: 14px;
  display: flex;
  align-items: baseline;
  gap: 10px;
}
.price{
  font-family: 'IBM Plex Mono', monospace;
  font-size: 24px;
  font-weight: 600;
}
.change{
  font-family: 'IBM Plex Mono', monospace;
  font-size: 13px;
  font-weight: 500;
}
.change.up{ color: var(--gain); }
.change.down{ color: var(--loss); }

.fields{
  margin-top: 14px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px 12px;
}
.field label{
  font-size: 10px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  font-family: 'IBM Plex Mono', monospace;
  display: block;
  margin-bottom: 3px;
}
.field input{
  width: 100%;
  background: var(--bg-panel);
  border: 1px solid var(--border);
  border-radius: 5px;
  color: var(--text);
  font-family: 'IBM Plex Mono', monospace;
  font-size: 13px;
  padding: 6px 8px;
}
.field input:focus{ outline: none; border-color: var(--accent-gold); }

.gainloss-row{
  margin-top: 14px;
  padding-top: 14px;
  border-top: 1px dashed var(--border);
  display: flex;
  justify-content: space-between;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 13px;
}
.gainloss-row .val.up{ color: var(--gain); }
.gainloss-row .val.down{ color: var(--loss); }

.insight-btn{
  margin-top: 12px;
  width: 100%;
  font-size: 12px;
  padding: 7px;
}
.insight-text{
  margin-top: 10px;
  font-size: 12.5px;
  line-height: 1.5;
  color: var(--text-dim);
  border-top: 1px dashed var(--border);
  padding-top: 10px;
}
.insight-text .src{
  color: var(--accent-gold);
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10.5px;
  display: block;
  margin-top: 6px;
}

/* Add card */
.add-card{
  border: 1px dashed var(--border);
  border-radius: 10px;
  padding: 18px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  justify-content: center;
}
.add-card input{
  background: var(--bg-panel);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-family: 'IBM Plex Mono', monospace;
  font-size: 13px;
  padding: 8px 10px;
}
.add-card input:focus{ outline: none; border-color: var(--accent-gold); }
.add-row{ display: flex; gap: 8px; }
.add-row input{ flex: 1; }
.add-hint{ font-size: 11px; color: var(--text-dim); }

.discover-controls{
  display: flex;
  gap: 10px;
  margin-bottom: 18px;
  flex-wrap: wrap;
}
.discover-controls input{
  flex: 1;
  min-width: 180px;
  background: var(--bg-panel);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-family: 'IBM Plex Sans', sans-serif;
  font-size: 13px;
  padding: 9px 12px;
}
.discover-controls input:focus{ outline: none; border-color: var(--accent-gold); }
.discover-controls select{
  background: var(--bg-panel);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-family: 'IBM Plex Sans', sans-serif;
  font-size: 13px;
  padding: 9px 12px;
}
.sector-tag{
  display: inline-block;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--accent-gold);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 2px 7px;
  margin-top: 6px;
}
.desc{
  font-size: 12.5px;
  line-height: 1.55;
  color: var(--text-dim);
  margin-top: 12px;
}
.discover-card-foot{
  margin-top: 14px;
  display: flex;
  gap: 8px;
}
.discover-card-foot .btn{ flex: 1; font-size: 12px; padding: 8px; }
.tag-added{
  font-size: 11px;
  color: var(--gain);
  font-family: 'IBM Plex Mono', monospace;
}

.portfolio-layout{
  display: grid;
  grid-template-columns: 260px 1fr;
  gap: 20px;
  align-items: start;
}
.dividend-panel{
  background: var(--bg-panel);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px;
  position: sticky;
  top: 20px;
}
.dividend-panel h3{
  font-family: 'IBM Plex Serif', serif;
  font-size: 15px;
  font-weight: 600;
  margin-bottom: 4px;
}
.dividend-panel .panel-sub{
  font-size: 11px;
  color: var(--text-dim);
  margin-bottom: 14px;
}
.dividend-total{
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px;
  margin-bottom: 14px;
}
.dividend-total .label{
  font-size: 10px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  font-family: 'IBM Plex Mono', monospace;
}
.dividend-total .amount{
  font-family: 'IBM Plex Mono', monospace;
  font-size: 20px;
  font-weight: 600;
  color: var(--accent-gold);
  margin-top: 4px;
}
.dividend-row{
  padding: 10px 0;
  border-top: 1px solid var(--border);
}
.dividend-row:first-of-type{ border-top: none; }
.dividend-row .dr-top{
  display: flex;
  justify-content: space-between;
  align-items: baseline;
}
.dividend-row .dr-ticker{
  font-family: 'IBM Plex Mono', monospace;
  font-weight: 600;
  font-size: 13px;
}
.dividend-row .dr-perf{
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
}
.dividend-row .dr-perf.up{ color: var(--gain); }
.dividend-row .dr-perf.down{ color: var(--loss); }
.dividend-row .dr-detail{
  font-size: 11px;
  color: var(--text-dim);
  margin-top: 4px;
  line-height: 1.5;
}
.dividend-row .dr-yield{
  color: var(--accent-gold);
  font-family: 'IBM Plex Mono', monospace;
}
.dividend-empty{
  font-size: 12px;
  color: var(--text-dim);
  line-height: 1.5;
}
@media (max-width: 720px){
  .portfolio-layout{ grid-template-columns: 1fr; }
  .dividend-panel{ position: static; }
}

.info-section{
  margin-top: 16px;
  padding-top: 14px;
  border-top: 1px solid var(--border);
}
.info-section-title{
  font-family: 'IBM Plex Serif', serif;
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 10px;
}
.info-grid{
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px 16px;
}
.info-grid > div{
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  border-bottom: 1px dashed var(--border);
  padding-bottom: 4px;
}
.info-label{ color: var(--text-dim); }
.info-val{ font-family: 'IBM Plex Mono', monospace; font-weight: 500; }
.info-link{
  display: inline-block;
  margin-top: 10px;
  font-size: 11px;
  color: var(--accent-gold);
  text-decoration: none;
}
.info-link:hover{ text-decoration: underline; }

.news-list{
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.news-item{
  display: block;
  padding: 8px 10px;
  background: var(--bg-panel);
  border: 1px solid var(--border);
  border-radius: 6px;
  text-decoration: none;
  transition: border-color 0.15s;
}
.news-item:hover{ border-color: var(--accent-gold); }
.news-headline{
  font-size: 12.5px;
  color: var(--text);
  line-height: 1.4;
}
.news-meta{
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10.5px;
  color: var(--text-dim);
  margin-top: 4px;
}

.chart-overlay{
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 100;
  padding: 20px;
}
.chart-overlay.open{ display: flex; }
.chart-modal{
  background: var(--bg-panel);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 22px;
  width: 100%;
  max-width: 640px;
  max-height: 90vh;
  overflow-y: auto;
}
.chart-modal-head{
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 4px;
}
.chart-modal-head .ct-ticker{
  font-family: 'IBM Plex Mono', monospace;
  font-size: 20px;
  font-weight: 600;
}
.chart-modal-head .ct-name{
  font-size: 12px;
  color: var(--text-dim);
  margin-top: 2px;
}
.chart-modal-head .ct-close{
  background: none;
  border: none;
  color: var(--text-dim);
  font-size: 20px;
  cursor: pointer;
  line-height: 1;
}
.chart-modal-head .ct-close:hover{ color: var(--text); }
.chart-current-price{
  font-family: 'IBM Plex Mono', monospace;
  font-size: 26px;
  font-weight: 600;
  margin: 10px 0 4px;
}
.chart-range-tabs{
  display: flex;
  gap: 6px;
  margin: 14px 0;
  flex-wrap: wrap;
}
.chart-range-tabs button{
  font-family: 'IBM Plex Mono', monospace;
  font-size: 12px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  color: var(--text-dim);
  padding: 5px 12px;
  border-radius: 6px;
  cursor: pointer;
}
.chart-range-tabs button.active{
  background: var(--accent-gold);
  color: #191510;
  border-color: var(--accent-gold);
  font-weight: 600;
}
.chart-svg-wrap{
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px;
}
.chart-meta{
  display: flex;
  justify-content: space-between;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  color: var(--text-dim);
  margin-top: 8px;
}
.chart-loading, .chart-error{
  text-align: center;
  padding: 50px 10px;
  color: var(--text-dim);
  font-size: 13px;
}
.ticker.clickable{
  cursor: pointer;
  text-decoration: underline;
  text-decoration-color: transparent;
  text-underline-offset: 3px;
  transition: text-decoration-color 0.15s;
}
.ticker.clickable:hover{ text-decoration-color: var(--accent-gold); }

.analyst-block{
  margin-top: 12px;
  padding-top: 12px;
  border-top: 1px dashed var(--border);
  font-size: 12px;
}
.analyst-block.analyst-empty{
  color: var(--text-dim);
  font-style: italic;
}
.analyst-verdict{
  font-weight: 500;
}
.analyst-verdict .up{ color: var(--gain); font-weight: 600; }
.analyst-verdict .down{ color: var(--loss); font-weight: 600; }
.analyst-counts{
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  color: var(--text-dim);
  margin-top: 3px;
}
.momentum-tag{
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  padding: 3px 8px;
  border-radius: 5px;
  border: 1px solid var(--border);
  display: inline-block;
  margin-top: 8px;
}
.momentum-tag.up{ color: var(--gain); border-color: var(--gain); }
.momentum-tag.down{ color: var(--loss); border-color: var(--loss); }

.empty{
  text-align: center;
  padding: 60px 20px;
  color: var(--text-dim);
}
.empty .big{
  font-family: 'IBM Plex Serif', serif;
  font-size: 20px;
  color: var(--text);
  margin-bottom: 8px;
}

.toast{
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--bg-panel);
  border: 1px solid var(--accent-gold);
  color: var(--text);
  padding: 10px 18px;
  border-radius: 8px;
  font-size: 13px;
  opacity: 0;
  transition: opacity 0.25s;
  pointer-events: none;
  z-index: 50;
}
.toast.show{ opacity: 1; }

.spin{
  display: inline-block;
  width: 12px; height: 12px;
  border: 2px solid rgba(255,255,255,0.25);
  border-top-color: var(--text);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  margin-right: 6px;
  vertical-align: -2px;
}
@keyframes spin{ to{ transform: rotate(360deg); } }

@media (max-width: 600px){
  .summary-row{ grid-template-columns: 1fr; }
  h1{ font-size: 26px; }
}
</style>
</head>
<body>

<div class="tape-wrap"><div class="tape" id="tape"></div></div>

<header>
  <div class="eyebrow">Personal Markets Desk</div>
  <h1>Ledger</h1>
  <div class="subtitle">Your holdings and watchlist, priced on demand.</div>
</header>

<div class="toolbar">
  <div class="tabs">
    <button class="tab-btn active" id="tab-portfolio" onclick="setTab('portfolio')">Portfolio</button>
    <button class="tab-btn" id="tab-watchlist" onclick="setTab('watchlist')">Watchlist</button>
    <button class="tab-btn" id="tab-discover" onclick="setTab('discover')">Discover</button>
  </div>
  <div class="spacer"></div>
  <span id="usage-badge" style="font-family:'IBM Plex Mono', monospace; font-size:11px; color:var(--text-dim); margin-right:4px;"></span>
  <button class="btn primary" id="refresh-btn" onclick="refreshPrices()">Refresh prices</button>
</div>

<main>
  <div class="summary-row" id="summary-row"></div>
  <div id="content"></div>
</main>

<div class="toast" id="toast"></div>

<div class="chart-overlay" id="chart-overlay" onclick="if(event.target===this) closeChart()">
  <div class="chart-modal" id="chart-modal"></div>
</div>

<script>
const SUPABASE_URL = 'https://etprvicvwxudexzkkkrf.supabase.co';
const SUPABASE_KEY = 'sb_publishable_vUJ4QnqmpJnuAN6qR0kmqg_85X_4FIg';
const SUPABASE_REST = `${SUPABASE_URL}/rest/v1/ledger`;

const ALPHA_VANTAGE_KEY = '6EASXIO49870WEEN';
function avUrl(fn, symbol){
  return `https://www.alphavantage.co/query?function=${fn}&symbol=${encodeURIComponent(symbol)}&apikey=${ALPHA_VANTAGE_KEY}`;
}
function isRateLimited(json){
  return !!(json && (json['Note'] || json['Information']));
}
function trackApiUse(){
  const today = new Date().toISOString().slice(0, 10);
  if (!state.dailyUsage || state.dailyUsage.date !== today){
    state.dailyUsage = { date: today, count: 0 };
  }
  state.dailyUsage.count++;
  updateUsageBadge();
}
function updateUsageBadge(){
  const el = document.getElementById('usage-badge');
  if (!el) return;
  const today = new Date().toISOString().slice(0, 10);
  const used = (state.dailyUsage && state.dailyUsage.date === today) ? state.dailyUsage.count : 0;
  const remaining = Math.max(0, 25 - used);
  el.textContent = `${remaining} of 25 lookups left today`;
  el.style.color = remaining <= 5 ? 'var(--loss)' : 'var(--text-dim)';
}
async function fetchQuote(ticker){
  const res = await fetch(avUrl('GLOBAL_QUOTE', ticker));
  const json = await res.json();
  trackApiUse();
  if (isRateLimited(json)) throw new Error('RATE_LIMIT');
  const q = json['Global Quote'];
  if (!q || !q['05. price']) throw new Error('NO_DATA');
  return {
    price: parseFloat(q['05. price']),
    changePct: parseFloat((q['10. change percent'] || '0').replace('%', ''))
  };
}
async function fetchOverview(ticker){
  const res = await fetch(avUrl('OVERVIEW', ticker));
  const json = await res.json();
  trackApiUse();
  if (isRateLimited(json)) throw new Error('RATE_LIMIT');
  if (!json || !json.Symbol) throw new Error('NO_DATA');
  const divYield = parseFloat(json.DividendYield);
  const divPerShare = parseFloat(json.DividendPerShare);
  return {
    name: json.Name || '',
    dividendYield: isNaN(divYield) ? 0 : divYield * 100,
    dividendPerShare: isNaN(divPerShare) ? 0 : divPerShare,
    peRatio: json.PERatio,
    analystTarget: json.AnalystTargetPrice,
    week52High: json['52WeekHigh'],
    week52Low: json['52WeekLow'],
    sector: json.Sector,
    industry: json.Industry
  };
}
function sleep(ms){ return new Promise(r => setTimeout(r, ms)); }

const FINNHUB_KEY = 'd9bd3qpr01qmk4glacagd9bd3qpr01qmk4glacb0';
async function fetchAnalystTrend(ticker){
  const res = await fetch(`https://finnhub.io/api/v1/stock/recommendation?symbol=${encodeURIComponent(ticker)}&token=${FINNHUB_KEY}`);
  if (!res.ok) throw new Error('NO_DATA');
  const json = await res.json();
  if (!Array.isArray(json) || !json.length) throw new Error('NO_DATA');
  const latest = json[0]; // most recent month
  return {
    strongBuy: latest.strongBuy || 0,
    buy: latest.buy || 0,
    hold: latest.hold || 0,
    sell: latest.sell || 0,
    strongSell: latest.strongSell || 0,
    period: latest.period || '',
    ts: Date.now()
  };
}
function analystVerdict(trend){
  if (!trend) return null;
  const bullish = trend.strongBuy + trend.buy;
  const bearish = trend.sell + trend.strongSell;
  const total = bullish + trend.hold + bearish;
  if (!total) return null;
  if (bullish / total >= 0.6) return { label: 'Buy', cls: 'up' };
  if (bearish / total >= 0.5) return { label: 'Sell', cls: 'down' };
  return { label: 'Hold', cls: '' };
}
function analystTrendIsFresh(trend){
  if (!trend || !trend.ts) return false;
  return new Date(trend.ts).toDateString() === new Date().toDateString();
}
async function attachAnalystTrend(target, ticker){
  if (analystTrendIsFresh(target.analystTrend)) return; // already have today's data
  try{
    target.analystTrend = await fetchAnalystTrend(ticker);
  }catch(err){
    console.error(`Analyst trend lookup failed for ${ticker}`, err);
  }
}
function analystBlockHtml(trend){
  if (!trend){
    return `<div class="analyst-block analyst-empty">Analyst data not loaded yet</div>`;
  }
  const v = analystVerdict(trend);
  return `
    <div class="analyst-block">
      <div class="analyst-verdict">Analyst consensus: <span class="${v ? v.cls : ''}">${v ? v.label : '—'}</span></div>
      <div class="analyst-counts">${trend.strongBuy + trend.buy} Buy · ${trend.hold} Hold · ${trend.sell + trend.strongSell} Sell</div>
    </div>`;
}

async function fetchDailySeries(ticker){
  const url = `https://www.alphavantage.co/query?function=TIME_SERIES_DAILY&symbol=${encodeURIComponent(ticker)}&outputsize=full&apikey=${ALPHA_VANTAGE_KEY}`;
  const res = await fetch(url);
  const json = await res.json();
  trackApiUse();
  if (isRateLimited(json)) throw new Error('RATE_LIMIT');
  const raw = json['Time Series (Daily)'];
  if (!raw) throw new Error('NO_DATA');
  const series = Object.keys(raw)
    .sort() // ascending date order
    .map(date => ({ date, close: parseFloat(raw[date]['4. close']) }));
  return series;
}

function uid(){ return 'id' + (uidCounter++) + '-' + Date.now().toString(36); }

function fmtMoney(n){
  if (n === null || n === undefined || isNaN(n)) return '—';
  return '$' + Number(n).toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
}
function fmtPct(n){
  if (n === null || n === undefined || isNaN(n)) return '—';
  const s = n >= 0 ? '+' : '';
  return s + n.toFixed(2) + '%';
}

function showToast(msg, ms=2600){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(showToast._h);
  showToast._h = setTimeout(()=> t.classList.remove('show'), ms);
}

async function loadState(){
  try{
    const res = await fetch(`${SUPABASE_REST}?id=eq.main&select=data`, {
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`
      }
    });
    if (!res.ok) throw new Error('Supabase load error ' + res.status);
    const rows = await res.json();
    if (rows && rows.length && rows[0].data && Object.keys(rows[0].data).length){
      state = Object.assign({holdings:[], watchlist:[], lastRefresh:null, discoverPrices:{}, dailyUsage:{date:'',count:0}, priceHistory:{}, finnhubInfo:{}}, rows[0].data);
      return true;
    }
  }catch(e){
    console.error('loadState error', e);
    showToast("Couldn't reach the cloud database — check your connection.");
  }
  return false;
}

async function saveState(){
  try{
    const res = await fetch(`${SUPABASE_REST}?id=eq.main`, {
      method: 'PATCH',
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`,
        'Content-Type': 'application/json',
        'Prefer': 'return=minimal'
      },
      body: JSON.stringify({ data: state, updated_at: new Date().toISOString() })
    });
    if (!res.ok) throw new Error('Supabase save error ' + res.status);
  }catch(e){
    showToast("Couldn't save to the cloud — check your connection.");
    console.error(e);
  }
}

function totals(){
  let invested = 0, value = 0;
  state.holdings.forEach(h => {
    invested += (h.costBasis || 0) * (h.shares || 0);
    value += (h.currentPrice || 0) * (h.shares || 0);
  });
  return { invested, value, gain: value - invested, gainPct: invested ? ((value - invested) / invested * 100) : 0 };
}

function renderTape(){
  const all = [...state.holdings, ...state.watchlist];
  const tape = document.getElementById('tape');
  if (!all.length){ tape.innerHTML = '<span class="tick flat">Add a stock to see it here</span>'.repeat(4); return; }
  let html = '';
  for (let i=0;i<4;i++){
    all.forEach(s => {
      const dir = (s.changePct > 0) ? 'up' : (s.changePct < 0 ? 'down' : 'flat');
      const arrow = dir === 'up' ? '▲' : (dir === 'down' ? '▼' : '·');
      html += `<span class="tick ${dir}">${s.ticker} ${fmtMoney(s.currentPrice)} ${arrow} ${fmtPct(s.changePct)}</span>`;
    });
  }
  tape.innerHTML = html;
}

function renderSummary(){
  const t = totals();
  const row = document.getElementById('summary-row');
  if (currentTab !== 'portfolio'){ row.innerHTML = ''; return; }
  const gainClass = t.gain >= 0 ? 'up' : 'down';
  row.innerHTML = `
    <div class="summary-card">
      <div class="summary-label">Invested</div>
      <div class="summary-value">${fmtMoney(t.invested)}</div>
    </div>
    <div class="summary-card">

      <div class="summary-value" style="color:var(--${t.gain >= 0 ? 'gain' : 'loss'})">${fmtMoney(t.gain)} (${fmtPct(t.gainPct)})</div>

}

async function loadDiscoverPrices(){
  const q = discoverQuery.toLowerCase();
  const filtered = DISCOVER_STOCKS.filter(s => {
    const matchesQuery = !q || s.ticker.toLowerCase().includes(q) || s.name.toLowerCase().includes(q);
    const matchesSector = discoverSector === 'All' || s.sector === discoverSector;
    return matchesQuery && matchesSector;
  });
  if (!filtered.length){ showToast('No stocks to load.'); return; }

  const btn = document.getElementById('discover-load-btn');
  if (btn){ btn.disabled = true; btn.innerHTML = '<span class="spin"></span>Loading…'; }

  let updated = 0;
  let rateLimited = false;
  try{
    for (const s of filtered){
      if (state.discoverPrices[s.ticker]){
        await attachAnalystTrend(state.discoverPrices[s.ticker], s.ticker);
        updated++;
        continue;
      } // already cached, skip a quota hit
      try{
        const q2 = await fetchQuote(s.ticker);
        state.discoverPrices[s.ticker] = { price: q2.price, changePct: q2.changePct, ts: Date.now() };
        await attachAnalystTrend(state.discoverPrices[s.ticker], s.ticker);
        updated++;
      }catch(err){
        if (err.message === 'RATE_LIMIT'){ rateLimited = true; break; }
        console.error(`Price lookup failed for ${s.ticker}`, err);
      }
      await sleep(900);
    }
    await saveState();
    renderContentOnly();
    if (rateLimited){
      showToast(`Hit Alpha Vantage's daily limit after ${updated}. Try again later.`, 4000);
    } else {
      showToast(`Loaded prices for ${updated} of ${filtered.length} stocks.`);
    }
  }catch(e){
    console.error(e);
    showToast("Couldn't load prices — try again in a moment.");
  }finally{
    if (btn){ btn.disabled = false; btn.innerHTML = 'Load prices'; }
  }
}

async function fetchProfile(ticker){
  const res = await fetch(`https://finnhub.io/api/v1/stock/profile2?symbol=${encodeURIComponent(ticker)}&token=${FINNHUB_KEY}`);
  const json = await res.json();
  if (!json || !json.name) throw new Error('NO_DATA');
  return json;
}
function escapeHtml(str){
  if (!str) return '';
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}
async function fetchCompanyNews(ticker){
  const to = new Date();
  const from = new Date();
  from.setDate(from.getDate() - 7);
  const fmt = d => d.toISOString().slice(0, 10);
  const res = await fetch(`https://finnhub.io/api/v1/company-news?symbol=${encodeURIComponent(ticker)}&from=${fmt(from)}&to=${fmt(to)}&token=${FINNHUB_KEY}`);
  const json = await res.json();
  if (!Array.isArray(json)) throw new Error('NO_DATA');
  return json
    .sort((a, b) => b.datetime - a.datetime)
    .slice(0, 6)
    .map(n => ({ headline: n.headline, source: n.source, url: n.url, datetime: n.datetime }));
}
function timeAgo(unixSeconds){
  const diffMs = Date.now() - unixSeconds * 1000;
  const hours = Math.floor(diffMs / 3600000);
  if (hours < 1) return 'Just now';
  if (hours < 24) return `${hours}h ago`;
  const days = Math.floor(hours / 24);
  return `${days}d ago`;
}
async function fetchBasicFinancials(ticker){
  const res = await fetch(`https://finnhub.io/api/v1/stock/metric?symbol=${encodeURIComponent(ticker)}&metric=all&token=${FINNHUB_KEY}`);
  const json = await res.json();
  if (!json || !json.metric) throw new Error('NO_DATA');
  return json.metric;
}
function pickMetric(metric, keys){
  for (const k of keys){
    if (metric && metric[k] !== undefined && metric[k] !== null) return metric[k];
  }
  return null;
}
function fmtMarketCap(millions){
  if (millions === null || millions === undefined) return '—';
  const usd = millions * 1e6;
  if (usd >= 1e12) return '$' + (usd / 1e12).toFixed(2) + 'T';
  if (usd >= 1e9) return '$' + (usd / 1e9).toFixed(2) + 'B';
  if (usd >= 1e6) return '$' + (usd / 1e6).toFixed(2) + 'M';
  return fmtMoney(usd);
}

// ===== Price history chart =====
let chartState = { ticker: null, name: '', series: [], range: '3M', info: null };
const CHART_RANGES = { '1W': 7, '1M': 30, '3M': 90, '6M': 182, '1Y': 365, '5Y': 1825, 'All': Infinity };

async function openChart(ticker, name){
  chartState = { ticker, name: name || '', series: [], range: '3M', info: null };
  const overlay = document.getElementById('chart-overlay');
  overlay.classList.add('open');
  renderChartModal(true);

  const cachedSeries = state.priceHistory[ticker];
  const seriesIsFresh = cachedSeries && cachedSeries.date === todayStr();
  const cachedInfo = state.finnhubInfo[ticker];
  const infoIsFresh = cachedInfo && cachedInfo.date === todayStr();

  if (seriesIsFresh) chartState.series = cachedSeries.series;
  if (infoIsFresh) chartState.info = cachedInfo;
  if (seriesIsFresh && infoIsFresh){ renderChartModal(false); return; }

  const jobs = [];
  jobs.push(seriesIsFresh
    ? Promise.resolve({ status: 'fulfilled', value: cachedSeries.series })
    : fetchDailySeries(ticker).then(v => ({ status: 'fulfilled', value: v })).catch(e => ({ status: 'rejected', reason: e })));
  jobs.push(infoIsFresh
    ? Promise.resolve({ status: 'fulfilled', value: cachedInfo })
    : Promise.allSettled([fetchProfile(ticker), fetchBasicFinancials(ticker), fetchAnalystTrend(ticker), fetchCompanyNews(ticker)])
        .then(([p, m, t, n]) => ({
          status: 'fulfilled',
          value: {
            profile: p.status === 'fulfilled' ? p.value : null,
            metrics: m.status === 'fulfilled' ? m.value : null,
            analystTrend: t.status === 'fulfilled' ? t.value : null,
            news: n.status === 'fulfilled' ? n.value : [],
            date: todayStr()
          }
        })));

  const [seriesResult, infoResult] = await Promise.all(jobs);

  let seriesErr = null;
  if (seriesResult.status === 'fulfilled'){
    chartState.series = seriesResult.value;
    state.priceHistory[ticker] = { series: seriesResult.value, date: todayStr() };
  } else {
    seriesErr = seriesResult.reason && seriesResult.reason.message === 'RATE_LIMIT'
      ? "Price history: hit Alpha Vantage's daily limit — try again tomorrow."
      : "Couldn't load price history for this stock.";
    if (cachedSeries){ chartState.series = cachedSeries.series; seriesErr = "Showing older price history — hit today's lookup limit."; }
  }

  if (infoResult.status === 'fulfilled'){
    chartState.info = infoResult.value;
    state.finnhubInfo[ticker] = infoResult.value;
  }

  await saveState();
  renderChartModal(false, seriesErr);
}

function closeChart(){
  document.getElementById('chart-overlay').classList.remove('open');
}

function setChartRange(range){
  chartState.range = range;
  renderChartModal(false);
}

function renderCompanyInfoHtml(info){
  if (!info || (!info.profile && !info.metrics && !info.analystTrend)){
    return `<div class="analyst-block analyst-empty">Company data not loaded yet.</div>`;
  }
  const p = info.profile;
  const m = info.metrics || {};

  const profileHtml = p ? `
    <div class="info-section">
      <div class="info-section-title">About</div>
      <div class="info-grid">
        <div><span class="info-label">Exchange</span><span class="info-val">${p.exchange || '—'}</span></div>
        <div><span class="info-label">Industry</span><span class="info-val">${p.finnhubIndustry || '—'}</span></div>
        <div><span class="info-label">Market cap</span><span class="info-val">${fmtMarketCap(p.marketCapitalization)}</span></div>
        <div><span class="info-label">IPO date</span><span class="info-val">${p.ipo || '—'}</span></div>
      </div>
      ${p.weburl ? `<a href="${p.weburl}" target="_blank" rel="noopener" class="info-link">${p.weburl.replace(/^https?:\/\//, '')}</a>` : ''}
    </div>` : '';

  const peVal = pickMetric(m, ['peTTM', 'peBasicExclExtraTTM', 'peExclExtraTTM', 'peNormalizedAnnual']);
  const epsVal = pickMetric(m, ['epsTTM', 'epsInclExtraItemsTTM', 'epsBasicExclExtraItemsTTM']);
  const betaVal = pickMetric(m, ['beta']);
  const divYieldVal = pickMetric(m, ['dividendYieldIndicatedAnnual', 'currentDividendYieldTTM']);
  const roeVal = pickMetric(m, ['roeTTM', 'roeRfy']);
  const grossMarginVal = pickMetric(m, ['grossMarginTTM', 'grossMarginAnnual']);
  const wk52High = pickMetric(m, ['52WeekHigh']);
  const wk52Low = pickMetric(m, ['52WeekLow']);

  const metricsHtml = Object.keys(m).length ? `
    <div class="info-section">
      <div class="info-section-title">Key metrics</div>
      <div class="info-grid">
        <div><span class="info-label">P/E (TTM)</span><span class="info-val">${peVal !== null ? peVal.toFixed(2) : '—'}</span></div>
        <div><span class="info-label">EPS (TTM)</span><span class="info-val">${epsVal !== null ? '$' + epsVal.toFixed(2) : '—'}</span></div>
        <div><span class="info-label">Beta</span><span class="info-val">${betaVal !== null ? betaVal.toFixed(2) : '—'}</span></div>
        <div><span class="info-label">Div. yield</span><span class="info-val">${divYieldVal !== null ? divYieldVal.toFixed(2) + '%' : '—'}</span></div>
        <div><span class="info-label">ROE (TTM)</span><span class="info-val">${roeVal !== null ? roeVal.toFixed(2) + '%' : '—'}</span></div>
        <div><span class="info-label">Gross margin</span><span class="info-val">${grossMarginVal !== null ? grossMarginVal.toFixed(2) + '%' : '—'}</span></div>
        <div><span class="info-label">52W high</span><span class="info-val">${wk52High !== null ? fmtMoney(wk52High) : '—'}</span></div>
        <div><span class="info-label">52W low</span><span class="info-val">${wk52Low !== null ? fmtMoney(wk52Low) : '—'}</span></div>
      </div>
    </div>` : '';

  const trendHtml = info.analystTrend ? `
    <div class="info-section">
      <div class="info-section-title">Analyst recommendations ${info.analystTrend.period ? `(as of ${info.analystTrend.period})` : ''}</div>
      ${analystBlockHtml(info.analystTrend)}
    </div>` : `<div class="info-section"><div class="info-section-title">Analyst recommendations</div><div class="analyst-block analyst-empty">Not available for this ticker.</div></div>`;

  const newsItems = info.news || [];
  const newsHtml = `
    <div class="info-section">
      <div class="info-section-title">Recent news</div>
      ${newsItems.length ? `
        <div class="news-list">
          ${newsItems.map(n => `
            <a class="news-item" href="${n.url}" target="_blank" rel="noopener">
              <div class="news-headline">${escapeHtml(n.headline)}</div>
              <div class="news-meta">${escapeHtml(n.source)} · ${timeAgo(n.datetime)}</div>
            </a>`).join('')}
        </div>` : `<div class="analyst-block analyst-empty">No recent news found for this ticker.</div>`}
    </div>`;

  return profileHtml + metricsHtml + trendHtml + newsHtml;
}

function renderChartModal(loading, errorMsg){
  const modal = document.getElementById('chart-modal');
  const { ticker, name, series, range } = chartState;
  const rangeButtons = Object.keys(CHART_RANGES).map(r =>
    `<button class="${r === range ? 'active' : ''}" onclick="setChartRange('${r}')">${r}</button>`
  ).join('');

  let body;
  if (loading){
    body = `<div class="chart-loading"><span class="spin"></span>Loading price history…</div>`;
  } else if (errorMsg && !series.length){
    body = `<div class="chart-error">${errorMsg}</div>`;
  } else {
    const days = CHART_RANGES[range];
    const sliced = isFinite(days) ? series.slice(-days) : series;
    body = `
      ${errorMsg ? `<div class="chart-error" style="padding:6px 0 12px;">${errorMsg}</div>` : ''}
      <div class="chart-svg-wrap">${buildChartSvg(sliced)}</div>
      <div class="chart-meta">
        <span>${sliced.length ? sliced[0].date : ''}</span>
        <span>${sliced.length ? sliced[sliced.length - 1].date : ''}</span>
      </div>`;
  }

  const latest = series.length ? series[series.length - 1].close : null;
  const first = (() => {
    const days = CHART_RANGES[range];
    const sliced = isFinite(days) ? series.slice(-days) : series;
    return sliced.length ? sliced[0].close : null;
  })();
  const periodChangePct = (latest !== null && first) ? ((latest - first) / first * 100) : null;
  const dirClass = periodChangePct > 0 ? 'up' : (periodChangePct < 0 ? 'down' : '');
  const momentum = computeMomentum(series);

  modal.innerHTML = `
    <div class="chart-modal-head">
      <div>
        <div class="ct-ticker">${ticker}</div>
        <div class="ct-name">${name || ''}</div>
      </div>
      <button class="ct-close" onclick="closeChart()">✕</button>
    </div>
    ${latest !== null ? `
      <div class="chart-current-price">${fmtMoney(latest)}</div>
      ${periodChangePct !== null ? `<div class="change ${dirClass}">${fmtPct(periodChangePct)} over ${range}</div>` : ''}
      ${momentum ? `<div class="momentum-tag ${momentum.cls}">Short-term: ${momentum.label}</div>` : ''}
    ` : ''}
    <div class="chart-range-tabs">${rangeButtons}</div>
    ${body}
    ${renderCompanyInfoHtml(chartState.info)}
  `;
}

function computeMomentum(series){
  if (!series || series.length < 20) return null;
  const closes = series.map(p => p.close);
  const avg = arr => arr.reduce((a, b) => a + b, 0) / arr.length;
  const last = closes[closes.length - 1];
  const sma20 = avg(closes.slice(-20));
  const sma50 = closes.length >= 50 ? avg(closes.slice(-50)) : null;
  if (sma50 !== null){
    if (last > sma20 && sma20 > sma50) return { label: 'Bullish (above 20 & 50-day averages)', cls: 'up' };
    if (last < sma20 && sma20 < sma50) return { label: 'Bearish (below 20 & 50-day averages)', cls: 'down' };
  }
  if (last > sma20) return { label: 'Mildly bullish (above 20-day average)', cls: 'up' };
  return { label: 'Mildly bearish (below 20-day average)', cls: 'down' };
}

function buildChartSvg(series){
  if (!series.length) return `<div class="chart-loading">No data for this range.</div>`;
  const w = 580, h = 220, pad = 10;
  const closes = series.map(p => p.close);
  const min = Math.min(...closes);
  const max = Math.max(...closes);
  const range = (max - min) || 1;
  const stepX = series.length > 1 ? (w - pad * 2) / (series.length - 1) : 0;
  const points = series.map((p, i) => {
    const x = pad + i * stepX;
    const y = pad + (h - pad * 2) * (1 - (p.close - min) / range);
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  });
  const isUp = closes[closes.length - 1] >= closes[0];
  const lineColor = isUp ? 'var(--gain)' : 'var(--loss)';
  const areaPoints = `${pad},${h - pad} ${points.join(' ')} ${w - pad},${h - pad}`;
  return `
    <svg viewBox="0 0 ${w} ${h}" width="100%" height="${h}" xmlns="http://www.w3.org/2000/svg">
      <polygon points="${areaPoints}" fill="${lineColor}" opacity="0.12"></polygon>
      <polyline points="${points.join(' ')}" fill="none" stroke="${lineColor}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"></polyline>
    </svg>`;
}

function todayStr(){
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
}

// A price move under this % is treated as noise — display and storage are left untouched to avoid wasted writes.
const MEANINGFUL_CHANGE_PCT = 0.03;
function isMeaningfulChange(oldPrice, newPrice){
  if (oldPrice === null || oldPrice === undefined || isNaN(oldPrice)) return true;
  if (oldPrice === 0) return newPrice !== 0;
  const pct = Math.abs(newPrice - oldPrice) / Math.abs(oldPrice) * 100;
  return pct >= MEANINGFUL_CHANGE_PCT;
}

async function autoFetchDiscover(limit){
  if (limit <= 0) return { fetched: 0, rateLimited: false };
  // Prioritize tickers with no cached data yet; once everything's cached, refresh the stalest entries.
  const uncached = DISCOVER_STOCKS.filter(s => !state.discoverPrices[s.ticker]);
  const cachedBystale = DISCOVER_STOCKS
    .filter(s => state.discoverPrices[s.ticker])
    .sort((a, b) => (state.discoverPrices[a.ticker].ts || 0) - (state.discoverPrices[b.ticker].ts || 0));
  const queue = [...uncached, ...cachedBystale].slice(0, limit);
  if (!queue.length) return { fetched: 0, rateLimited: false };

  let fetched = 0;
  let rateLimited = false;
  for (const s of queue){
    try{
      const q = await fetchQuote(s.ticker);
      const entry = state.discoverPrices[s.ticker] || {};
      if (isMeaningfulChange(entry.price, q.price)){
        entry.price = q.price;
        entry.changePct = q.changePct;
      }
      entry.ts = Date.now(); // mark as checked today either way, so we don't re-check it again before other stocks
      state.discoverPrices[s.ticker] = entry;
      await attachAnalystTrend(entry, s.ticker);
      fetched++;
      if (currentTab === 'discover') renderContentOnly();
    }catch(err){
      if (err.message === 'RATE_LIMIT'){ rateLimited = true; break; }
      console.error(`Auto-fetch failed for ${s.ticker}`, err);
    }
    await sleep(900);
  }
  return { fetched, rateLimited };
}

let dailyAutoRunInFlight = false;

async function dailyAutoRun(){
  if (dailyAutoRunInFlight) return; // already running in this tab
  if (state.lastAutoRunDate === todayStr()) return; // already ran today
  dailyAutoRunInFlight = true;

  // Mark today as "claimed" and save immediately — before any fetching — so a page
  // reload mid-run can't start a second overlapping run and clobber your data.
  state.lastAutoRunDate = todayStr();
  await saveState();

  try{
    const portfolioItems = [...state.holdings, ...state.watchlist];
    let checked = 0;
    let changed = 0;
    let rateLimited = false;

    // 1. Your own stocks first — always take priority for the daily quota.
    for (const item of portfolioItems){
      try{
        const q = await fetchQuote(item.ticker);
        checked++;
        if (isMeaningfulChange(item.currentPrice, q.price)){
          item.currentPrice = q.price;
          item.changePct = q.changePct;
          changed++;
        }
        await attachAnalystTrend(item, item.ticker);
      }catch(err){
        if (err.message === 'RATE_LIMIT'){ rateLimited = true; break; }
        console.error(`Daily check failed for ${item.ticker}`, err);
      }
      await sleep(900);
    }
    if (changed > 0) render();

    // 2. Whatever's left of the daily budget goes to Discover.
    let discoverResult = { fetched: 0, rateLimited: false };
    if (!rateLimited){
      const remaining = Math.max(0, 25 - checked);
      discoverResult = await autoFetchDiscover(remaining);
    }

    await saveState(); // persist the actual price/dividend updates from this run

    const bits = [];
    if (portfolioItems.length) bits.push(`checked your ${portfolioItems.length} stock${portfolioItems.length === 1 ? '' : 's'} (${changed} moved)`);
    if (discoverResult.fetched) bits.push(`loaded ${discoverResult.fetched} new Discover price${discoverResult.fetched === 1 ? '' : 's'}`);
    if (bits.length) showToast('Today: ' + bits.join(', ') + '.', 4000);
    if (rateLimited || discoverResult.rateLimited){
      showToast("Hit Alpha Vantage's daily limit — picks up where it left off tomorrow.", 4000);
    }
  } finally {
    dailyAutoRunInFlight = false;
  }
}

(async function init(){
  const had = await loadState();
  if (!had) { seedDefaults(); await saveState(); }
  render();
  updateUsageBadge();
  if (state.lastAutoRunDate !== todayStr()){
    dailyAutoRun(); // fire and forget — runs in the background, doesn't block the UI
  }
})();
</script>
